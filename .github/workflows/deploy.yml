name: Deploy to ECS

on:
  push:
    branches:
      - dev
      - stage
      - main

jobs:

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/reusable.yml
    with:
      service: flask-dev-service
      cluster: flask-dev-cluster
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    environment: dev

  deploy-stage:
    if: github.ref == 'refs/heads/stage'
    uses: ./.github/workflows/reusable.yml
    with:
      service: flask-stage-service
      cluster: flask-stage-cluster
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    environment: stage

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable.yml
    with:
      service: flask-prod-service
      cluster: flask-prod-cluster
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    environment: prod