name: Deploy App

on:
  push:
    branches:
      - dev
      - stage
      - main   

  pull_request:
    branches:
      - stage   # when PR merged to stage
    types: [closed]

  workflow_dispatch:   # manual trigger for prod

permissions:
  id-token: write
  contents: read
      - prod
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    #  THIS LINE LINKS ENVIRONMENT
    environment: ${{ github.ref_name }}

    uses: ./.github/workflows/ecs-deploy.yml

    with:
      service: flask-cluster-task-service-qccqm59g 
      cluster: flask-cluster
      environment: stage
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

  #  PROD DEPLOY (manual only)
  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    uses: kondeti-chaithanya/ecs-reusable-workflow/.github/workflows/ecs-deploy.yml@main
    with:
      service: flask-cluster-task-service-qccqm59g
      cluster: flask-cluster
      environment: prod
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}


    secrets: inherit